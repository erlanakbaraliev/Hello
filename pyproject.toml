[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["notebooks", "src/data", "src/experiments"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501", "B905"]

[tool.ruff.lint.per-file-ignores]
"app.py" = ["E402"]
# Streamlit entry scripts run importlib bootstrap before ``from front_end ...`` (see invoke_bootstrap.py).
"src/front_end/Home.py" = ["E402"]
"src/front_end/pages/*" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["src/tests"]
python_files = ["test_*.py"]
pythonpath = ["src"]
addopts = [
    "--cov=src/db",
    "--cov=src/back_end",
    "--cov-report=term-missing",
]

[tool.coverage.run]
source = ["src/db", "src/back_end"]
branch = true
omit = ["src/tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 1
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
exclude = ["notebooks/", "src/experiments/"]
