name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff black mypy

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Pytest
        run: pytest -q

      - name: Mypy
        run: mypy src/db src/back_end
